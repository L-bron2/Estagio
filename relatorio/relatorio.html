<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios</title>
    <link rel="stylesheet" href="relatorio.css">
</head>

<body>

    <div class="voltar">
        <p>
            <a href="../controle/controle.html">← Voltar</a>
        </p>
    </div>

    <div class="container">
        <h1>Produtos - Relatórios</h1>

        <div class="filtros-section">
            <h2>Stock por Armazém e Total</h2>

            <!-- armazem selection -->
            <div class="armazem-section">
                <div class="armazem-grupo">
                    <label for="armazem">Armazém:</label>
                    <select id="armazem">
                        <option value="">-- Todos os armazéns --</option>
                    </select>
                </div>
            </div>

            <!--Input section -->
            <div class="input-section">
                <div class="input-grup">
                    <label for="Prod-name">Produto:</label>
                    <input type="text" id="Prod-name" placeholder="Nome do produto...">

                    <label for="quantidade-filtro">Quantidade:</label>
                    <select id="quantidade-filtro">
                        <option value="">-- Todos --</option>
                        <option value="maior_zero">Maior que zero</option>
                        <option value="diferente_zero">Diferente de zero</option>
                        <option value="igual_zero">Igual a zero</option>
                    </select>
                </div>
            </div>

            <div class="botoes-section">
                <button id="filtrar-btn">Filtrar</button>
            </div>
        </div>

        <!-- tabela de relatórios -->
        <div class="tabela">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Armazém</th>
                        <th>Fornecedor</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody id="tabela-relatorio"></tbody>
            </table>

        </div>

        <script src="../auth.js"></script>
        <script src="relatorio.js"></script>
</body>

</html>
