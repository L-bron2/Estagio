<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro funcionário</title>
    <link rel="stylesheet" href="registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>

    <div class="voltar">
        <a href="../controle/controle.html">Voltar</a>
    </div>

    <div class="container">
        <div class="main">
            <h1>Meu registro</h1>

            <p id="estado-registros" class="mensagem-estado">A carregar registos...</p>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Utilizador</th>
                        <th>Data</th>
                        <th>H. presença</th>
                        <th>Data Importção</th>
                    </tr>
                </thead>
                <tbody id="tabelaRegistro"></tbody>
            </table>

        </div>

        <!-- Paginação -->
        <div class="paginacao">
            <button onclick="paginaAnterior()">
                <span class="material-symbols-outlined">
                    arrow_back_ios
                </span>
            </button>

            <span id="pagina-info"></span>

            <button onclick="proximaPagina()">
                <span class="material-symbols-outlined">
                    arrow_forward_ios
                </span>
            </button>
        </div>
    </div>

    <script src="../auth.js"></script>
    <script src="registro.js"></script>
</body>

</html>
