<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <title>Produtos</title>
  <link rel="stylesheet" href="produtos.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
</head>

<body>

  <!-- side bar para menu -->
  <button class="menuBTN" id="menuBTN">
    <span class="material-symbols-outlined">menu</span>
  </button>


  <div class="menu" id="menu">

    <h3>Sub paginas </h3>
    <div class="page">
      <a href="../subProduto/subProd.html">Gerir stock</a>
    </div>
    
    <div class="montra">
      <a href="../montra/montra.html">Registrar-contagem</a>
    </div>
    
    <div class="voltar">
      <p>
        <a href="../controle/controle.html">← Voltar</a>
      </p>
    </div>
  </div>


  <div class="container">
    <h1>Produtos</h1>
    <p class="armazem-info">Armazém: <strong id="armazem-nome">-</strong></p>

    <!-- Pesquisa -->
    <input type="text" id="pesquisa" placeholder="Procurar produto...">

    <div class="filtros-produtos">
      <select id="filtroArmazem">
        <option value="">Todos os armazens</option>
      </select>

      <select id="filtroTipoProd">
        <option value="">Todos os tipos</option>
        <option value="prodVenda">Produtos para venda</option>
        <option value="prodConsumo">Produtos para consumo</option>
        <option value="prodBrinde">Produtos para brinde</option>
      </select>
    </div>

    <!--  Form -->
    <form id="form-produto">
      <input type="text" id="nome" placeholder="Nome do produto" required>
      <input type="number" id="stock" placeholder="Stock inicial" required>
      <!-- tipos de produto -->
      <section>
        <select name="tipoProd" id="tipoProd" required>
          <option value="" disabled selected>Tipo de produto</option>
          <option value="prodVenda">Venda</option>
          <option value="prodConsumo">Consumo</option>
          <option value="prodBrinde">Brinde</option>
        </select>
      </section>
      <!--Armazem disponiveis-->
      <section>
        <select name="armazemDestino" id="armazemDestino" required>
          <option value="" disabled selected>Armazem</option>
        </select>
      </section>
      <input type="text" id="fornecedor" placeholder="Fornecedor" required>
      <button type="submit">Adicionar produto</button>
    </form>

    <!-- Tabela -->
    <table>
      <thead>
        <tr>
          <th class="id">ID</th>
          <th class="campo-nome">Nome</th>
          <th class="tipoProd">Tipo de produto</th>
          <th class="campo-fornecedor">Fornecedor</th>
          <th class="campo-armazem">Armazém</th>
          <th class="campo-stock">Stock</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-produtos"></tbody>
    </table>

    <!-- Paginação -->
    <div class="paginacao">

      <button class="btnPagina" onclick="paginaAnterior()">
        <span class="material-symbols-outlined">
          arrow_back_ios
        </span>
      </button>

      <span id="pagina-info"></span>

      <button class="btnPagina" onclick="proximaPagina()">
        <span class="material-symbols-outlined">
          arrow_forward_ios
        </span>
      </button>
    </div>
  </div>


  <script src="../auth.js"></script>
  <script src="produtos.js"></script>
</body>

</html>
